<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
  {{ partial "head.html" . }}
</head>
<body>
  {{ partial "header.html" . }}
  {{ partial "nav.html" . }}
  <main id="main-content">
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
  <script>
    // Hamburger toggle
    const hamburger = document.getElementById('hamburger');
    const nav = document.getElementById('main-nav');
    hamburger.addEventListener('click', function() {
      const expanded = this.getAttribute('aria-expanded') === 'true';
      this.setAttribute('aria-expanded', !expanded);
      this.classList.toggle('open');
      nav.classList.toggle('open');
    });

    // Mobile dropdown toggles — only intercept clicks on small screens
    document.querySelectorAll('.has-dropdown > .nav-link, .has-dropdown > .dropdown-link').forEach(function(link) {
      link.addEventListener('click', function(e) {
        if (window.innerWidth > 768) return;
        e.preventDefault();
        const item = this.parentElement;
        const wasOpen = item.classList.contains('open');
        // Close siblings
        item.parentElement.querySelectorAll('.has-dropdown.open').forEach(function(el) {
          el.classList.remove('open');
          el.querySelector('[aria-expanded]') && el.querySelector('[aria-expanded]').setAttribute('aria-expanded', 'false');
        });
        if (!wasOpen) {
          item.classList.add('open');
          this.setAttribute('aria-expanded', 'true');
        }
      });
    });

    // Close dropdowns when clicking outside (desktop)
    document.addEventListener('click', function(e) {
      if (!e.target.closest('.has-dropdown')) {
        document.querySelectorAll('.has-dropdown.open').forEach(function(el) {
          el.classList.remove('open');
        });
      }
    });
  </script>
</body>
</html>
