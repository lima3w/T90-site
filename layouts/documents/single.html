{{ define "main" }}
<article class="page-content container">
  <header class="page-header">
    <h1 class="page-title">{{ .Title }}</h1>
  </header>
  <div class="prose">
    {{ with .Description }}<p>{{ . }}</p>{{ end }}
    {{ .Content }}
    {{ with .Params.file }}
    <p><a class="btn btn-primary" href="{{ . }}" target="_blank" rel="noopener">Download Document</a></p>
    {{ else }}{{ with .Params.link }}
    <p><a class="btn btn-primary" href="{{ . }}" target="_blank" rel="noopener">View Document</a></p>
    {{ end }}{{ end }}
  </div>
  <p style="margin-top:2rem;"><a href="{{ "documents/" | relURL }}">&larr; Back to Documents</a></p>
</article>
{{ end }}
